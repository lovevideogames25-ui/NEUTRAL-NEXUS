<!DOCTYPE html>

     │ Music Player                                                        │

     │ APIs: LRCLIB, iTunes, YouTube                                       │

     └─────────────────────────────────────────────────────────────────────┘ -->



<html lang="en">



<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Neutral Nexus Music</title>

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }



    body {

      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,

        Arial, sans-serif;

      background: linear-gradient(135deg, #0a0514 0%, #1a0f2e 50%, #0f0a1a 100%);

      min-height: 100vh;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      color: #e8e8e8;

      padding: 40px 20px;

      transition: background 0.5s ease, filter 0.5s ease;

    }



    .container {

      width: 100%;

      max-width: 600px;

      display: flex;

      flex-direction: column;

      gap: 24px;

    }



    .header {

      text-align: center;

      margin-bottom: 8px;

    }



    .header h1 {

      font-size: 48px;

      font-weight: 700;

      background: linear-gradient(135deg, #9333ea 0%, #a855f7 50%, #c084fc 100%);

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

      background-clip: text;

      margin-bottom: 8px;

      letter-spacing: -1px;

    }



    .header p {

      font-size: 16px;

      color: rgba(255, 255, 255, 0.6);

      font-weight: 400;

    }



    .search-container {

      width: 100%;

      position: relative;

    }



    .search-input {

      width: 100%;

      padding: 18px 24px 18px 56px;

      background: rgba(0, 0, 0, 0.4);

      border: 2px solid rgba(168, 85, 247, 0.3);

      border-radius: 20px;

      color: #e8e8e8;

      font-size: 16px;

      font-family: "Outfit", sans-serif;

      outline: none;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);

    }



    .search-input:focus {

      border-color: #9333ea;

      box-shadow: 0 0 0 4px rgba(147, 51, 234, 0.15), 0 8px 30px rgba(147, 51, 234, 0.3);

      transform: translateY(-2px);

    }



    .search-input::placeholder {

      color: rgba(255, 255, 255, 0.4);

      transition: opacity 0.2s ease;

    }



    .search-input:focus::placeholder {

      opacity: 0;

    }



    .search-icon {

      position: absolute;

      left: 20px;

      top: 50%;

      transform: translateY(-50%);

      color: rgba(168, 85, 247, 0.6);

      pointer-events: none;

      transition: color 0.3s ease;

    }



    .search-input:focus ~ .search-icon {

      color: #9333ea;

    }



    .player-container {

      background: linear-gradient(145deg, rgba(147, 51, 234, 0.15) 0%, rgba(124, 58, 237, 0.08) 100%);

      border: 2px solid rgba(168, 85, 247, 0.3);

      border-radius: 28px;

      padding: 32px;

      position: relative;

      overflow: hidden;

      backdrop-filter: blur(20px);

      box-shadow: 0 12px 48px rgba(147, 51, 234, 0.25);

    }



    .button-row {

      display: flex;

      gap: 12px;

    }



    .top-button {

      flex: 1;

      padding: 18px;

      background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(124, 58, 237, 0.08) 100%);

      border: 2px solid rgba(168, 85, 247, 0.25);

      border-radius: 16px;

      color: #e8e8e8;

      cursor: pointer;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      display: flex;

      align-items: center;

      justify-content: center;

      box-shadow: 0 4px 16px rgba(147, 51, 234, 0.15);

    }



    .top-button:hover {

      background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);

      border-color: rgba(168, 85, 247, 0.6);

      transform: translateY(-3px) scale(1.02);

      box-shadow: 0 8px 32px rgba(147, 51, 234, 0.4);

    }



    .top-button.disabled {

      background: rgba(0, 0, 0, 0.3);

      border-color: rgba(255, 255, 255, 0.1);

      cursor: default;

      color: #666;

      box-shadow: none;

    }



    .top-button.disabled:hover {

      background: rgba(0, 0, 0, 0.3);

      border-color: rgba(255, 255, 255, 0.1);

      transform: none;

      box-shadow: none;

    }



    .main-content {

      transition: opacity 0.3s ease;

    }



    .main-content.hidden {

      opacity: 0;

    }



    .song-display {

      display: flex;

      gap: 20px;

      margin-bottom: 24px;

      align-items: center;

    }



    .album-art {

      width: 120px;

      height: 120px;

      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(124, 58, 237, 0.1) 100%);

      border-radius: 20px;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 40px;

      color: rgba(168, 85, 247, 0.6);

      flex-shrink: 0;

      box-shadow: 0 8px 32px rgba(147, 51, 234, 0.25);

      border: 2px solid rgba(168, 85, 247, 0.2);

      overflow: hidden;

    }



    .album-art img {

      width: 100%;

      height: 100%;

      object-fit: cover;

      border-radius: 18px;

    }



    .song-info {

      flex: 1;

      display: flex;

      flex-direction: column;

      justify-content: center;

      gap: 8px;

    }



    .song-title {

      font-size: 28px;

      font-weight: 700;

      color: #ffffff;

      line-height: 1.2;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;

    }



    .song-artist {

      font-size: 18px;

      color: rgba(255, 255, 255, 0.7);

      line-height: 1.3;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;

    }



    .controls {

      display: flex;

      flex-direction: column;

      gap: 16px;

    }



    .scrub-container {

      display: flex;

      align-items: center;

      gap: 12px;

    }



    .time-display {

      font-size: 14px;

      color: rgba(255, 255, 255, 0.6);

      min-width: 50px;

      text-align: center;

      font-weight: 500;

    }



    .scrub-bar {

      flex: 1;

      height: 8px;

      background: rgba(0, 0, 0, 0.4);

      border-radius: 4px;

      position: relative;

      cursor: pointer;

      transition: height 0.2s ease;

    }



    .scrub-bar:hover {

      height: 10px;

    }



    .scrub-progress {

      height: 100%;

      background: linear-gradient(90deg, #9333ea 0%, #a855f7 50%, #c084fc 100%);

      border-radius: 4px;

      width: 0%;

      transition: width 0.05s ease;

      box-shadow: 0 0 15px rgba(147, 51, 234, 0.6);

    }



    .play-pause-container {

      display: flex;

      justify-content: center;

      align-items: center;

      gap: 12px;

    }



    .control-button {

      width: 48px;

      height: 48px;

      background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(124, 58, 237, 0.08) 100%);

      border: 2px solid rgba(168, 85, 247, 0.25);

      border-radius: 14px;

      color: #e8e8e8;

      cursor: pointer;

      display: flex;

      align-items: center;

      justify-content: center;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      box-shadow: 0 4px 16px rgba(147, 51, 234, 0.15);

    }



    .control-button:hover {

      background: linear-gradient(135deg, rgba(168, 85, 247, 0.3) 0%, rgba(124, 58, 237, 0.2) 100%);

      border-color: rgba(168, 85, 247, 0.5);

      transform: translateY(-3px) scale(1.08);

      box-shadow: 0 8px 24px rgba(147, 51, 234, 0.35);

    }



    .control-button.active {

      background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);

      border-color: rgba(168, 85, 247, 0.6);

      box-shadow: 0 8px 24px rgba(147, 51, 234, 0.4);

    }



    .play-pause {

      width: 64px;

      height: 64px;

      background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);

      border: 2px solid rgba(168, 85, 247, 0.4);

      border-radius: 18px;

      color: #ffffff;

      cursor: pointer;

      display: flex;

      align-items: center;

      justify-content: center;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      box-shadow: 0 8px 32px rgba(147, 51, 234, 0.4);

    }



    .play-pause:hover {

      background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);

      transform: translateY(-3px) scale(1.08);

      box-shadow: 0 12px 40px rgba(147, 51, 234, 0.5);

    }



    .search-results {

      position: absolute;

      top: 0;

      left: 0;

      right: 0;

      bottom: 0;

      background: linear-gradient(145deg, rgba(147, 51, 234, 0.2) 0%, rgba(124, 58, 237, 0.1) 100%);

      backdrop-filter: blur(20px);

      padding: 24px;

      opacity: 0;

      visibility: hidden;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      overflow-y: auto;

      border-radius: 26px;

    }



    .search-results.visible {

      opacity: 1;

      visibility: visible;

    }



    .search-result-item {

      display: flex;

      gap: 16px;

      padding: 16px;

      border-radius: 16px;

      cursor: pointer;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      margin-bottom: 12px;

      background: rgba(0, 0, 0, 0.2);

      border: 1px solid rgba(168, 85, 247, 0.15);

    .search-result-item:hover {

      background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(124, 58, 237, 0.15) 100%);

      border-color: rgba(168, 85, 247, 0.5);

      transform: translateY(-3px) scale(1.02);

      box-shadow: 0 8px 24px rgba(147, 51, 234, 0.3);

    }



    .search-result-art {

      width: 64px;

      height: 64px;

      border-radius: 14px;

      object-fit: cover;

      background: rgba(0, 0, 0, 0.3);

      border: 1px solid rgba(168, 85, 247, 0.15);

    }



    .search-result-info {

      flex: 1;

      display: flex;

      flex-direction: column;

      justify-content: center;

    }



    .search-result-title {

      font-size: 16px;

      font-weight: 600;

      color: #ffffff;

      margin-bottom: 6px;

    }



    .search-result-artist {

      font-size: 14px;

      color: rgba(255, 255, 255, 0.6);

    }



    .lyrics-view {

      position: absolute;

      top: 0;

      left: 0;

      right: 0;

      bottom: 0;

      background: linear-gradient(145deg, rgba(147, 51, 234, 0.2) 0%, rgba(124, 58, 237, 0.1) 100%);

      backdrop-filter: blur(20px);

      padding: 28px;

      opacity: 0;

      visibility: hidden;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      overflow: hidden;

      text-align: left;

      border-radius: 26px;

    }



    .lyrics-view.visible {

      opacity: 1;

      visibility: visible;

    }



    .lyrics-scroll {

      height: 100%;

      overflow-y: auto;

      position: relative;

      transition: transform 0.4s ease;

    }



    .lyric-line {

      text-align: left;

      margin: 8px 0;

      padding: 12px 20px;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      font-size: 16px;

      line-height: 1.6;

      opacity: 0.4;

      color: rgba(255, 255, 255, 0.5);

      filter: blur(2px);

      border-radius: 12px;

    }



    .lyric-line.current {

      opacity: 1;

      color: #ffffff;

      font-weight: 600;

      font-size: 20px;

      filter: blur(0px);

      background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(124, 58, 237, 0.15) 100%);

      border: 1px solid rgba(168, 85, 247, 0.3);

      box-shadow: 0 8px 24px rgba(147, 51, 234, 0.25);

    }



    .lyric-line.next {

      opacity: 0.7;

      color: rgba(255, 255, 255, 0.8);

      filter: blur(1px);

    }



    .lyric-line.prev {

      opacity: 0.55;

      color: rgba(255, 255, 255, 0.6);

      filter: blur(1.8px);

    }



    .loading {

      text-align: center;

      color: rgba(255, 255, 255, 0.6);

      font-size: 16px;

      padding: 24px;

      font-weight: 500;

    }



    .hidden-player {

      position: absolute;

      left: -9999px;

      width: 1px;

      height: 1px;

      opacity: 0;

    }



    .tooltip {

      position: absolute;

      background: linear-gradient(135deg, rgba(147, 51, 234, 0.9) 0%, rgba(124, 58, 237, 0.8) 100%);

      color: #fff;

      padding: 12px 18px;

      border-radius: 14px;

      font-size: 14px;

      font-weight: 500;

      white-space: nowrap;

      pointer-events: none;

      z-index: 1000;

      opacity: 0;

      transform: scale(0.8) translateY(-8px);

      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

      box-shadow: 0 12px 32px rgba(147, 51, 234, 0.4);

      border: 1px solid rgba(168, 85, 247, 0.4);

      backdrop-filter: blur(10px);

    }



    .tooltip.show {

      opacity: 1;

      transform: scale(1) translateY(0);

    }



    .tooltip::before {

      content: '';

      position: absolute;

      bottom: 100%;

      left: 50%;

      transform: translateX(-50%);

      border: 1px solid rgba(168, 85, 247, 0.4);

      border-bottom-color: rgba(147, 51, 234, 0.9);

    }



    #ambienceOverlay {

      background-size: 200%;

      background-position: center;

      transition: opacity 0.35s ease;

      z-index: -1;

      filter: brightness(0.1);

    }



    @media (max-width: 768px) {

      .header h1 {

        font-size: 32px;

      }



      .song-display {

        flex-direction: column;

        text-align: center;

        gap: 16px;

      }



      .album-art {

        width: 100px;

        height: 100px;

        margin: 0 auto;

      }

    }

  </style>

</head>

  <script>

    let player;

    let currentSong = null;

    let lyrics = [];

    let currentLyricIndex = -1;

    let syncInterval;

    let searchTimeout;

    let isSearching = false;

    let lyricsVisible = false;

    let isRepeating = false;

    let ambienceVisible = false;

    let ytApiKey = typeof ytSec !== 'undefined' ? ytSec : null;





    function onYouTubeIframeAPIReady() {

      console.log("youtube api is READY! OHH YEAHHHHHHHH");

    }





    function formatTime(seconds) {

      const mins = Math.floor(seconds / 60);

      const secs = Math.floor(seconds % 60);

      return `${mins}:${secs.toString().padStart(2, "0")}`;

    }

  </script>

  <script>



    document

      .getElementById("searchInput")

      .addEventListener("input", function (e) {

        const query = e.target.value.trim();



        clearTimeout(searchTimeout);



        if (query.length < 2) {

          hideSearchResults();

          return;

        }



        searchTimeout = setTimeout(() => {

          searchMusic(query);

        }, 300);

      });



    async function searchMusic(query) {

      const searchResults = document.getElementById("searchResults");

      const mainContent = document.getElementById("mainContent");



      if (isSearching) return;

      isSearching = true;



      try {

        mainContent.classList.add("hidden");

        searchResults.classList.add("visible");

        searchResults.innerHTML = '<div class="loading">Searching...</div>';



        const response = await fetch(

          `https://itunes.apple.com/search?term=${encodeURIComponent(

            query

          )}&media=music&entity=song&limit=20`

        );

        const data = await response.json();



        searchResults.innerHTML = "";



        if (data.results && data.results.length > 0) {

          data.results.forEach((song) => {

            const item = document.createElement("div");

            item.className = "search-result-item";

            item.innerHTML = `

                            <img src="${song.artworkUrl60 || ""

              }" alt="" class="search-result-art" onerror="this.style.display='none'">

                            <div class="search-result-info">

                                <div class="search-result-title">${song.trackName

              }</div>

                                <div class="search-result-artist">${song.artistName

              }</div>

                            </div>

                        `;



            item.addEventListener("click", () => selectSong(song));

            searchResults.appendChild(item);

          });

        } else {

          searchResults.innerHTML =

            '<div class="loading">No results found</div>';

        }

      } catch (error) {

        console.error("Search error:", error);

        searchResults.innerHTML = '<div class="loading">Search failed</div>';

      } finally {

        isSearching = false;

      }

    }

  </script>

  <script>

    async function selectSong(song) {

      currentSong = song;



      document.getElementById("songTitle").textContent = song.trackName;

      document.getElementById("songArtist").textContent = song.artistName;



      const albumArt = document.getElementById("albumArt");

      if (song.artworkUrl100) {

        albumArt.innerHTML = `<img src="${song.artworkUrl100}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 6px;">`;

      } else {

        albumArt.innerHTML = "♫";

      }



      document.getElementById("searchInput").value = "";

      hideSearchResults();



      await loadYT(song);



      await loadLyrics(song);

    }



    async function loadYT(song) {

      try {

        if (!ytApiKey) {

          console.error("YouTube API key not found");

          alert("YouTube API key not configured");

          return;

        }

        const searchQuery = `${song.trackName} ${song.artistName}`;

        

        // Use YouTube Data API v3 to search for videos (no CORS proxy needed)

        const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&type=video&maxResults=1&key=${ytApiKey}`;

        

        const response = await fetch(searchUrl);

        const data = await response.json();

        

        if (!response.ok) {

          console.error("YouTube API error details:", data);

          throw new Error(`YouTube API error: ${response.status} - ${data.error?.message || 'Unknown error'}`);

        }

        

        if (data.items && data.items.length > 0) {

          const videoId = data.items[0].id.videoId;

          createPlayer(videoId);

        } else {

          alert("No videos found for this song");

        }

      } catch (error) {

        console.error("YouTube search error:", error);

        alert("Error loading video: " + error.message);

      }

    }



    function createAudioPlayer(audioUrl, song) {

      // Remove existing YouTube player if any

      const existingPlayer = document.getElementById('audioPlayer');

      if (existingPlayer) {

        existingPlayer.remove();

      }



      // Create audio player

      const audio = document.createElement('audio');

      audio.id = 'audioPlayer';

      audio.src = audioUrl;

      audio.controls = true;

      audio.style.width = '100%';

      audio.style.marginTop = '16px';

      

      const playerContainer = document.querySelector('.player-container');

      playerContainer.appendChild(audio);



      // Update play/pause button to control audio

      const playPause = document.getElementById('playPause');

      playPause.onclick = () => {

        if (audio.paused) {

          audio.play();

        } else {

          audio.pause();

        }

      };



      // Update scrub bar based on audio

      audio.addEventListener('timeupdate', () => {

        const percent = (audio.currentTime / audio.duration) * 100;

        document.getElementById('scrubProgress').style.width = percent + '%';

        document.getElementById('currentTime').textContent = formatTime(audio.currentTime);

        document.getElementById('totalTime').textContent = formatTime(audio.duration);

      });



      audio.addEventListener('ended', () => {

        if (isRepeating) {

          audio.currentTime = 0;

          audio.play();

        }

      });

    }



    function createPlayer(videoId) {

      if (player) {

        player.loadVideoById(videoId);

        return;

      }



      player = new YT.Player("ytPlayer", {

        height: "1",

        width: "1",

        videoId: videoId,

        host: "https://www.youtube-nocookie.com",

        playerVars: {

          playsinline: 1,

          origin: window.location.origin,

          enablejsapi: 1,

          rel: 0,

          modestbranding: 1,

          controls: 0,

        },

        events: {

          onReady: onPlayerReady,

          onStateChange: onPlayerStateChange,

        },

      });

    }



    function onPlayerReady(event) {

      console.log("Player ready");

      updateScrubBar();

    }



    function onPlayerStateChange(event) {

      const playPause = document.getElementById("playPause");



      if (event.data == YT.PlayerState.PLAYING) {

        playPause.innerHTML = `

                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                        <rect x="14" y="4" width="4" height="16" rx="1"/>

                        <rect x="6" y="4" width="4" height="16" rx="1"/>

                    </svg>

                `;

        startLyricSync();

      } else {

        playPause.innerHTML = `

                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                        <polygon points="6,3 20,12 6,21"/>

                    </svg>

                `;

        stopLyricSync();

      }



      if (event.data == YT.PlayerState.ENDED && isRepeating) {

        player.seekTo(0);

        player.playVideo();

      }

    }

  </script>

  <script>



    async function loadLyrics(song) {

      try {

        const apiUrl = `https://lrclib.net/api/get?artist_name=${encodeURIComponent(

          song.artistName

        )}&track_name=${encodeURIComponent(song.trackName)}`;

        const response = await fetch(apiUrl);



        if (response.ok) {

          const data = await response.json();

          if (data.syncedLyrics) {

            lyrics = parseLyrics(data.syncedLyrics);

            displayLyrics();

          }

        }

      } catch (error) {

        console.error("Lyrics error:", error);

        lyrics = [];

      }

    }



    function parseLyrics(syncedLyricsText) {

      if (!syncedLyricsText) return [];



      const lines = syncedLyricsText.split("\n");

      const parsed = [];



      for (const line of lines) {

        const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2})\]\s*(.*)/);

        if (match) {

          const minutes = parseInt(match[1]);

          const seconds = parseInt(match[2]);

          const centiseconds = parseInt(match[3]);

          const timeInSeconds = minutes * 60 + seconds + centiseconds / 100;

          const text = match[4].trim();



          if (text) {

            parsed.push({

              time: timeInSeconds,

              text: text,

            });

          }

        }

      }



      return parsed.sort((a, b) => a.time - b.time);

    }



    function displayLyrics() {

      const container = document.getElementById("lyricsScroll");

      container.innerHTML = "";



      lyrics.forEach((lyric, index) => {

        const div = document.createElement("div");

        div.className = "lyric-line";

        div.textContent = lyric.text;

        div.dataset.index = index;

        container.appendChild(div);

      });

    }



    function updateLyricDisplay(currentTime) {

      let newIndex = -1;



      for (let i = 0; i < lyrics.length; i++) {

        if (currentTime >= lyrics[i].time) {

          newIndex = i;

        } else {

          break;

        }

      }



      if (newIndex !== currentLyricIndex) {

        currentLyricIndex = newIndex;



        const lines = document.querySelectorAll(".lyric-line");

        lines.forEach((line, index) => {

          line.className = "lyric-line";



          if (index === currentLyricIndex) {

            line.classList.add("current");

          } else if (index === currentLyricIndex + 1) {

            line.classList.add("next");

          } else if (index === currentLyricIndex - 1) {

            line.classList.add("prev");

          }

        });





        if (currentLyricIndex >= 0 && lines[currentLyricIndex]) {

          lines[currentLyricIndex].scrollIntoView({

            behavior: "smooth",

            block: "center",

          });

        }

      }

    }



    function startLyricSync() {

      if (syncInterval) clearInterval(syncInterval);



      syncInterval = setInterval(() => {

        if (player && player.getCurrentTime) {

          const currentTime = player.getCurrentTime();

          updateLyricDisplay(currentTime);

        }

      }, 100);

    }



    function stopLyricSync() {

      if (syncInterval) {

        clearInterval(syncInterval);

        syncInterval = null;

      }

    }

  </script>

  <script>

    document

      .getElementById("playPause")

      .addEventListener("click", function () {

        if (player && player.getPlayerState) {

          const state = player.getPlayerState();

          if (state === YT.PlayerState.PLAYING) {

            player.pauseVideo();

          } else {

            player.playVideo();

          }

        }

      });





    document

      .getElementById("skipBack10")

      .addEventListener("click", function () {

        if (player && player.getCurrentTime) {

          const currentTime = player.getCurrentTime();

          player.seekTo(Math.max(0, currentTime - 10));

        }

      });



    document

      .getElementById("skipBack5")

      .addEventListener("click", function () {

        if (player && player.getCurrentTime) {

          const currentTime = player.getCurrentTime();

          player.seekTo(Math.max(0, currentTime - 5));

        }

      });



    document

      .getElementById("skipForward5")

      .addEventListener("click", function () {

        if (player && player.getCurrentTime && player.getDuration) {

          const currentTime = player.getCurrentTime();

          const duration = player.getDuration();

          player.seekTo(Math.min(duration, currentTime + 5));

        }

      });



    document

      .getElementById("skipForward10")

      .addEventListener("click", function () {

        if (player && player.getCurrentTime && player.getDuration) {

          const currentTime = player.getCurrentTime();

          const duration = player.getDuration();

          player.seekTo(Math.min(duration, currentTime + 10));

        }

      });



    document

      .getElementById("repeatButton")

      .addEventListener("click", function () {

        isRepeating = !isRepeating;

        this.classList.toggle("active", isRepeating);

      });



    document

      .getElementById("scrubBar")

      .addEventListener("click", function (e) {

        if (player && player.getDuration) {

          const rect = this.getBoundingClientRect();

          const percent = (e.clientX - rect.left) / rect.width;

          const duration = player.getDuration();

          player.seekTo(duration * percent);

        }

      });

    document

      .getElementById("ambienceToggle")

      .addEventListener("click", function () {

        const overlay = document.getElementById("ambienceOverlay");

        if (ambienceVisible) {

          overlay.style.opacity = '0';

          ambienceVisible = false;

        } else {

          if (currentSong && currentSong.artworkUrl100) {

            overlay.style.backgroundImage = `url(${currentSong.artworkUrl100})`;

          }

          overlay.style.opacity = '1';

          ambienceVisible = true;

        }

      });

    document

      .getElementById("lyricsToggle")

      .addEventListener("click", function () {

        const lyricsView = document.getElementById("lyricsView");

        const mainContent = document.getElementById("mainContent");



        if (lyricsVisible) {

          lyricsView.classList.remove("visible");

          mainContent.classList.remove("hidden");

          lyricsVisible = false;

        } else {

          if (lyrics.length > 0) {

            mainContent.classList.add("hidden");

            lyricsView.classList.add("visible");

            lyricsVisible = true;

          }

        }

      });

  </script>

  <script>

    function hideSearchResults() {

      document.getElementById("searchResults").classList.remove("visible");

      document.getElementById("mainContent").classList.remove("hidden");

      isSearching = false;

    }



    function updateScrubBar() {

      if (player && player.getCurrentTime && player.getDuration) {

        const current = player.getCurrentTime();

        const total = player.getDuration();

        const percent = (current / total) * 100;



        document.getElementById("scrubProgress").style.width = percent + "%";

        document.getElementById("currentTime").textContent =

          formatTime(current);

        document.getElementById("totalTime").textContent = formatTime(total);

      }



      if (player) {

        requestAnimationFrame(updateScrubBar);

      }

    }





    document.addEventListener("click", function (e) {

      if (

        !e.target.closest(".search-container") &&

        !e.target.closest(".search-results")

      ) {

        hideSearchResults();

      }

    });





    let currentTooltip = null;

    let tooltipTimeout = null;

    let showTimeout = null;

    let isQuickMoving = false;



    function createTooltip(element, text) {

      const tooltip = document.createElement('div');

      tooltip.className = 'tooltip';

      tooltip.textContent = text;



      tooltip.style.visibility = 'hidden';

      tooltip.style.opacity = '0';

      document.body.appendChild(tooltip);



      const rect = element.getBoundingClientRect();

      const tooltipRect = tooltip.getBoundingClientRect();





      const centerX = rect.left + window.scrollX + (rect.width / 2);

      const tooltipLeft = centerX - (tooltipRect.width / 2);



      tooltip.style.left = tooltipLeft - 7 + 'px';

      tooltip.style.top = rect.bottom + window.scrollY + 8 + 'px';



      tooltip.style.visibility = 'visible';

      tooltip.style.opacity = '';

      tooltip.classList.add('show');



      return tooltip;

    }



    function removeTooltip() {

      if (showTimeout) {

        clearTimeout(showTimeout);

        showTimeout = null;

      }



      if (currentTooltip) {

        currentTooltip.classList.remove('show');

        const tooltipToRemove = currentTooltip;

        currentTooltip = null;



        setTimeout(() => {

          if (tooltipToRemove && tooltipToRemove.parentNode) {

            tooltipToRemove.parentNode.removeChild(tooltipToRemove);

          }

        }, 100);

      }

    }



    function showTooltipDELAY(element, text) {

      if (showTimeout) {

        clearTimeout(showTimeout);

      }



      const delay = isQuickMoving ? 0 : 600;



      showTimeout = setTimeout(() => {

        if (!currentTooltip) {

          currentTooltip = createTooltip(element, text);

        }

      }, delay);

    }





    const tooltipButtons = [

      {id: 'skipBack10', text: 'Back 10s'},

      {id: 'repeatButton', text: 'Repeat'},

      {id: 'skipBack5', text: 'Back 5s'},

      {id: 'skipForward5', text: 'Forward 5s'},

      {id: 'skipForward10', text: 'Forward 10s'},

      {id: 'lyricsToggle', text: 'Toggle lyrics'}

    ];



    tooltipButtons.forEach(({id, text}) => {

      const element = document.getElementById(id);

      if (element) {

        element.addEventListener('mouseenter', function () {

          showTooltipDELAY(this, text);

        });



        element.addEventListener('mouseleave', function () {

          removeTooltip();

          isQuickMoving = true;

          setTimeout(() => {

            isQuickMoving = false;

          }, 300);

        });

      }

    });



    const topButtons = document.querySelectorAll('.top-button');

    const topButtonTexts = ['Ambience', 'RAAAWRRRR!!', 'Show Lyrics'];



    topButtons.forEach((button, index) => {

      button.addEventListener('mouseenter', function () {

        if (!this.classList.contains('disabled')) {

          showTooltipDELAY(this, topButtonTexts[index]);

        }

      });



      button.addEventListener('mouseleave', function () {

        removeTooltip();

        isQuickMoving = true;

        setTimeout(() => {

          isQuickMoving = false;

        }, 300);

      });

    });

  </script>
