<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Outfit", Arial, sans-serif;
        background: transparent;
        color: white;
      }

      .content {
        padding-top: 30px;
        height: calc(100% - 80px);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        text-align: center;
        padding-bottom: 60px;
        padding-left: 30px;
        padding-right: 30px;
      }

      .filter-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 30px;
        width: auto;
        margin-top: 15px;
      }

      .search-input {
        width: 500px;
        padding: 16px 20px;
        border-radius: 8px;
        background: rgba(168, 85, 247, 0.15);
        border: 2px solid rgba(168, 85, 247, 0.3);
        font-size: 16px;
        outline: none;
        color: rgba(255, 255, 255, 0.9);
        font-family: "Outfit";
        transition: all 0.3s ease;
        margin-right: 10px;
      }

      .search-input:hover {
        background: rgba(168, 85, 247, 0.2);
        border-color: rgba(168, 85, 247, 0.5);
      }

      .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        justify-content: center;
        padding: 20px;
        margin-top: 10px;
      }

      .game {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background-size: cover;
        background-position: center;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid rgba(168, 85, 247, 0.2);
        box-shadow: 0 4px 16px rgba(147, 51, 234, 0.2);
      }

      .game:hover {
        transform: translateY(-4px) scale(1.02);
        border-color: rgba(168, 85, 247, 0.6);
        box-shadow: 0 8px 24px rgba(147, 51, 234, 0.4);
      }

      .game:hover .overlay {
        background: rgba(0, 0, 0, 0.6);
      }

      .game:hover h2 {
        font-size: 20px;
        filter: blur(10px);
        opacity: 0;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 20px;
        transition: 0.3s;
      }

      .overlay h2 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        transition: all 0.3s ease;
      }

      .progress-container {
        display: none;
      }
      .progress-bar {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: #9333ea;
        transition: 0.15s ease;
      }
      .progress-text {
        margin-top: 5px;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.8);
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-content {
        background: linear-gradient(135deg, rgba(30, 30, 50, 0.98), rgba(20, 20, 35, 0.98));
        border: 2px solid rgba(168, 85, 247, 0.6);
        border-radius: 20px;
        padding: 40px;
        max-width: 900px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        text-align: center;
        box-shadow: 0 20px 60px rgba(147, 51, 234, 0.5), 0 0 40px rgba(168, 85, 247, 0.3);
        animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .modal-title {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 25px;
        color: white;
        text-shadow: 0 2px 10px rgba(168, 85, 247, 0.5);
        letter-spacing: -0.5px;
      }

      .link-button {
        display: block;
        width: 60%;
        padding: 12px 20px;
        margin: 8px auto;
        background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(147, 51, 234, 0.15));
        border: 2px solid rgba(168, 85, 247, 0.5);
        border-radius: 12px;
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-family: "Outfit", "Inter", sans-serif;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        cursor: pointer;
        text-align: center;
        letter-spacing: 0.3px;
        position: relative;
        overflow: hidden;
      }

      .link-button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transition: left 0.5s ease;
      }

      .link-button:hover::before {
        left: 100%;
      }

      .link-button:hover {
        background: linear-gradient(135deg, rgba(168, 85, 247, 0.35), rgba(147, 51, 234, 0.35));
        border-color: rgba(168, 85, 247, 0.8);
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 25px rgba(147, 51, 234, 0.4);
      }

      .close-button {
        margin-top: 25px;
        padding: 12px 40px;
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.2));
        border: 2px solid rgba(239, 68, 68, 0.5);
        border-radius: 12px;
        color: white;
        font-size: 16px;
        font-family: "Outfit", "Inter", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        letter-spacing: 0.5px;
      }

      .close-button:hover {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(220, 38, 38, 0.4));
        border-color: rgba(239, 68, 68, 0.8);
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nanum+Gothic&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://atugatran.github.io/FontAwesome6Pro/css/all.min.css"
    />
    <style>
      #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: -99;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/scripts/particle.js"></script>
  </head>
  <body>
    <div id="particles-js"></div>
    <div class="content">
      <div class="filter-container">
        <input
          type="text"
          class="search-input"
          placeholder="Loading..."
          id="searchInput"
          disabled
        />
      </div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
        <div class="progress-text" id="progressText">0</div>
      </div>
      <div class="game-grid" id="gameGrid" style="opacity: 0"></div>
    </div>

    <div id="linkModal" class="modal">
      <div class="modal-content">
        <h2 class="modal-title" id="modalTitle">Available Links</h2>
        <div id="modalLinks"></div>
        <button class="close-button" onclick="closeModal()">Close</button>
      </div>
    </div>
    <script>
      let games = [];
      let activeFilters = [];
      let searchInput = document.getElementById("searchInput");
      let progressBarFill = document.getElementById("progressBarFill");
      let progressText = document.getElementById("progressText");
      let progressContainer = document.getElementById("progressContainer");
      let gameGrid = document.getElementById("gameGrid");

      function encodeBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      function formatGameTitle(title) {
        return title
          .replace(/-/g, " ")
          .split(" ")
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(" ");
      }

      async function loadGames() {
        const response = await fetch("/_a/links.json");
        const data = await response.json();
        games = data;

        progressText.textContent = `0/${games.length}`;

        for (let i = 0; i < games.length; i++) {
          progressText.textContent = `${i + 1}/${games.length}`;
          progressBarFill.style.width = `${((i + 1) / games.length) * 100}%`;
        }

        await new Promise((resolve) => setTimeout(resolve, 100));

        searchInput.placeholder = `Search ${games.length} links...`;
        searchInput.disabled = false;

        progressContainer.style.display = "none";
        gameGrid.style.opacity = "1";

        renderGames();
      }

      function renderGames() {
        const grid = document.getElementById("gameGrid");
        grid.innerHTML = "";

        const searchValue = document
          .getElementById("searchInput")
          .value.toLowerCase();

        games.forEach((game) => {
          const displayGame = game.name;
          let backgroundUrl = game.img;

          if (displayGame.toLowerCase().includes(searchValue)) {
            const gameDiv = document.createElement("div");
            gameDiv.classList.add("game");
            
            if (!backgroundUrl.startsWith("http") && !backgroundUrl.startsWith("/")) {
              backgroundUrl = "../" + backgroundUrl;
            }
            gameDiv.style.backgroundImage = `url(${backgroundUrl})`;

            gameDiv.addEventListener("click", () => {
              if (game.links) {
                showModal(game.name, game.links);
              } else if (game.url) {
                window.open(game.url, "_blank");
              }
            });

            const overlay = document.createElement("div");
            overlay.classList.add("overlay");

            const title = document.createElement("h2");
            title.textContent = formatGameTitle(displayGame);

            overlay.appendChild(title);
            gameDiv.appendChild(overlay);
            grid.appendChild(gameDiv);
          }
        });
      }

      function showModal(name, links) {
        const modal = document.getElementById("linkModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalLinks = document.getElementById("modalLinks");

        modalTitle.textContent = `${name} - Available Links`;
        modalLinks.innerHTML = "";

        links.forEach((link) => {
          const button = document.createElement("a");
          button.className = "link-button";
          button.href = link;
          button.target = "_blank";
          button.textContent = link;
          modalLinks.appendChild(button);
        });

        modal.style.display = "flex";
      }

      function closeModal() {
        const modal = document.getElementById("linkModal");
        modal.style.display = "none";
      }

      window.onclick = function(event) {
        const modal = document.getElementById("linkModal");
        if (event.target == modal) {
          closeModal();
        }
      }

      document
        .getElementById("searchInput")
        .addEventListener("input", renderGames);

      function filterGames(category) {
        const index = activeFilters.indexOf(category);
        if (index > -1) {
          activeFilters.splice(index, 1);
        } else {
          activeFilters.push(category);
        }
        renderGames();
      }

      loadGames();
    </script>
  </body>
</html>
