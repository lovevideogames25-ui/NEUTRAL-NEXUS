<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/defaults.css" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Outfit", Arial, sans-serif;
        background: transparent;
        color: white;
      }

      .content {
        padding-top: 30px;
        height: 100%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        text-align: center;
        padding-bottom: 60px;
        padding-left: 30px;
        padding-right: 30px;
      }

      .filter-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 30px;
        width: auto;
        margin-top: 15px;
      }

      .search-input {
        width: 500px;
        padding: 16px 20px;
        border-radius: 8px;
        background: rgba(168, 85, 247, 0.15);
        border: 2px solid rgba(168, 85, 247, 0.3);
        font-size: 16px;
        outline: none;
        color: rgba(255, 255, 255, 0.9);
        transition: all 0.3s ease;
        margin-right: 10px;
      }

      .search-input:focus {
        width: 520px;
        border-color: #9333ea;
        box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.2);
      }

      .search-input::placeholder {
        transition: opacity 0.2s ease;
        opacity: 1;
      }

      .search-input:focus::placeholder {
        opacity: 0;
      }
      .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        justify-content: center;
        padding: 20px;
        margin-top: 10px;
      }

      .game {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background-size: cover;
        background-position: center;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid rgba(168, 85, 247, 0.2);
        box-shadow: 0 4px 16px rgba(147, 51, 234, 0.2);
      }

      .game:hover {
        transform: translateY(-4px) scale(1.02);
        border-color: rgba(168, 85, 247, 0.6);
        box-shadow: 0 8px 24px rgba(147, 51, 234, 0.4);
      }

      .game:hover .overlay {
        background: rgba(0, 0, 0, 0.6);
      }

      .game:hover .movie-title {
        font-size: 20px;
        filter: blur(10px);
        opacity: 0;
        font-weight: 700;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 15px;
        transition: 0.15s;
      }

      .overlay .movie-title {
        margin: 0;
        font-size: 25px;
        transition: all 0.15s ease, opacity 0.25s ease;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        position: relative;
        width: 1200px;
        height: 800px;
        background: black;
        border-radius: 12px;
        overflow: hidden;
      }

      .modal-content.fullscreen {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.8);
        border-bottom: 1px solid rgba(147, 51, 234, 0.3);
      }

      .modal-buttons {
        display: flex;
        gap: 8px;
      }

      .modal-btn {
        padding: 8px 16px;
        background: rgba(147, 51, 234, 0.2);
        border: 1px solid rgba(147, 51, 234, 0.4);
        border-radius: 6px;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 14px;
      }

      .modal-btn:hover {
        background: rgba(147, 51, 234, 0.4);
      }

      .modal-iframe {
        width: 100%;
        height: calc(100% - 49px);
        border: none;
      }

      .iframe-container {
        flex: 1;
        position: relative;
        width: 100%;
        height: calc(100% - 49px);
      }

      .iframe-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
    <style>
      #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: -99;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/scripts/particle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dreamland"></script>
    <script src="/baremux/index.js"></script>
    <script src="/scram/scramjet.controller.js"></script>
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="particles-js"></div>
    <div class="content">
      <div class="filter-container">
        <input
          type="text"
          class="search-input"
          placeholder="Search movies"
          id="searchInput"
        />
      </div>
      <div class="game-grid" id="gameGrid"></div>
    </div>
    <div class="modal" id="modal">
      <div class="modal-content" id="modalContent">
        <div class="modal-header">
          <span id="modalTitle">Movie</span>
          <div class="modal-buttons">
            <button class="modal-btn" id="fullscreenBtn">Fullscreen</button>
            <button class="modal-btn" id="closeBtn">Close</button>
          </div>
        </div>
        <div class="iframe-container" id="iframeContainer"></div>
      </div>
    </div>
    <script src="/scripts/secrets.js"></script>
    <script>
      const searchInput = document.getElementById("searchInput"),
        gameGrid = document.getElementById("gameGrid");

      // Initialize Scramjet
      const scramjet = new ScramjetController({
        files: {
          wasm: "/scram/scramjet.wasm.wasm",
          worker: "/scram/scramjet.worker.js",
          client: "/scram/scramjet.client.js",
          shared: "/scram/scramjet.shared.js",
          sync: "/scram/scramjet.sync.js",
        },
      });

      scramjet.init();

      const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

      const store = {
        wispurl:
          _CONFIG?.wispurl ||
          (location.protocol === "https:" ? "wss" : "ws") +
            "://" +
            location.host +
            "/wisp/",
        bareurl:
          _CONFIG?.bareurl ||
          (location.protocol === "https:" ? "https" : "http") +
            "://" +
            location.host +
            "/bare/",
      };

      connection.setTransport("/epoxy/index.mjs", [{ wisp: store.wispurl }]);

      let movieFrame = null;

      async function getPopularMov() {
        const e = await fetch(
          `https://api.themoviedb.org/3/movie/popular?api_key=${movSec}`
        );
        displayMov((await e.json()).results);
      }
      async function searchMov(e) {
        const t = await fetch(
          `https://api.themoviedb.org/3/search/movie?api_key=${movSec}&query=${encodeURIComponent(
            e
          )}`
        );
        displayMov((await t.json()).results);
      }
      function displayMov(e) {
        (gameGrid.innerHTML = ""),
          e.forEach((e) => {
            const t = document.createElement("div");
            t.classList.add("game"),
              (t.style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${e.poster_path})`),
              (t.innerHTML = `\n            <div class="overlay">\n              <div class="movie-title">${e.title}</div>\n            </div>\n          `),
              t.addEventListener("click", () => {
                openMovieModal(e.id, e.title);
              }),
              gameGrid.appendChild(t);
          });
      }

      function openMovieModal(movieId, movieTitle) {
        const modal = document.getElementById("modal");
        const modalTitle = document.getElementById("modalTitle");
        const iframeContainer = document.getElementById("iframeContainer");

        // Clear previous frame
        iframeContainer.innerHTML = "";

        // Create new scramjet frame
        movieFrame = scramjet.createFrame();
        iframeContainer.appendChild(movieFrame.frame);

        const movieUrl = `https://vidnest.fun/movie/${movieId}`;
        movieFrame.go(movieUrl);

        modalTitle.textContent = movieTitle;
        modal.classList.add("active");
      }

      function closeModal() {
        const modal = document.getElementById("modal");
        const iframeContainer = document.getElementById("iframeContainer");
        modal.classList.remove("active");
        iframeContainer.innerHTML = "";
        movieFrame = null;
      }

      function toggleFullscreen() {
        const modalContent = document.getElementById("modalContent");
        modalContent.classList.toggle("fullscreen");
      }

      document.getElementById("closeBtn").addEventListener("click", closeModal);
      document.getElementById("fullscreenBtn").addEventListener("click", toggleFullscreen);

      // Close modal on escape key
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModal();
        }
      });

      // Close modal when clicking outside content
      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target.id === "modal") {
          closeModal();
        }
      });

      searchInput.addEventListener("keypress", function (e) {
        if ("Enter" === e.key) {
          const e = searchInput.value;
          e ? searchMov(e) : getPopularMov();
        }
      }),
        getPopularMov();
    </script>
  </body>
</html>
