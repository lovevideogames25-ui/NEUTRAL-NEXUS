<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/defaults.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0a1a;
            height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1a0f2e 0%, #0f0a1a 100%);
            border-right: 1px solid rgba(168, 85, 247, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            font-size: 24px;
            font-weight: 700;
            color: #a855f7;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .room-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .room-item {
            padding: 15px 20px;
            background: rgba(168, 85, 247, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #a0b0c0;
        }

        .room-item:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.5);
            color: #a855f7;
            transform: translateX(5px);
        }

        .room-item.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: #a855f7;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0a1a;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(168, 85, 247, 0.05);
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 20px;
            font-weight: 600;
            color: #a855f7;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-counter {
            background: rgba(168, 85, 247, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #a855f7;
            cursor: pointer;
            border: 1px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }

        .user-counter:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .user-tooltip {
            position: absolute;
            top: 70px;
            right: 30px;
            background: #1a0f2e;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            padding: 15px;
            max-width: 250px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .user-tooltip.visible {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .user-tooltip ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .user-tooltip li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            font-size: 14px;
            color: #a0b0c0;
        }

        .user-tooltip li:last-child {
            border-bottom: none;
        }

        .messages-area {
            flex: 1;
            padding: 20px 30px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message-wrapper.my-message-wrapper {
            align-self: flex-end;
        }

        .message-wrapper.other-message-wrapper {
            align-self: flex-start;
        }

        .username-label {
            font-size: 12px;
            color: #a855f7;
            margin-bottom: 5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .owner-badge {
            color: #ff6b6b;
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .my-message-wrapper .message-bubble {
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .other-message-wrapper .message-bubble {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            text-align: center;
            font-size: 13px;
            color: #6a7a8a;
            padding: 10px;
            background: rgba(106, 122, 138, 0.1);
            border-radius: 8px;
            align-self: center;
        }

        .input-area {
            padding: 20px 30px;
            background: rgba(168, 85, 247, 0.05);
            border-top: 1px solid rgba(168, 85, 247, 0.3);
            display: none;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 25px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.15);
        }

        .message-input::placeholder {
            color: #6a7a8a;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .char-count {
            font-size: 12px;
            color: #6a7a8a;
            position: absolute;
            bottom: 30px;
            right: 100px;
        }

        .countdown {
            font-size: 12px;
            color: #ff6b6b;
            position: absolute;
            bottom: 30px;
            right: 100px;
            display: none;
        }

        .username-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 10, 26, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0f2e 0%, #0f0a1a 100%);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            text-align: center;
            min-width: 350px;
        }

        .modal-title {
            font-size: 28px;
            color: #a855f7;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .username-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 25px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .username-input:focus {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.15);
        }

        .join-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
        }

        .owner-notice {
            font-size: 12px;
            color: #ff6b6b;
            margin-top: 15px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f0a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.6);
        }
    </style>
    <title>Neon Chat</title>
</head>

<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">NEON CHAT</div>
            <div class="room-list">
                <div class="room-item" onclick="joinRoom('r1')">Room 1</div>
                <div class="room-item" onclick="joinRoom('r2')">Room 2</div>
                <div class="room-item" onclick="joinRoom('r3')">Room 3</div>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-title">Select a Room</div>
                <div class="user-info">
                    <div class="user-counter" id="userCounter">
                        <i class="fas fa-users"></i> <span id="userCount">0</span>
                    </div>
                    <div class="user-tooltip" id="userTooltip">
                        <ul id="userList"></ul>
                    </div>
                </div>
            </div>

            <div class="messages-area" id="messages"></div>

            <div class="input-area" id="chatArea">
                <div class="input-wrapper">
                    <input type="text" class="message-input" id="messageInput" placeholder="Type your message..." disabled maxlength="250">
                    <button class="send-btn" id="sendButton" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="char-count" id="messageCounter">0/250</div>
                <div class="countdown" id="countdown"></div>
            </div>
        </div>
    </div>

    <div class="username-modal" id="usernameModal">
        <div class="modal-content">
            <div class="modal-title">Enter Username</div>
            <input type="text" class="username-input" id="username" placeholder="Your username" maxlength="16" autofocus>
            <button class="join-btn" id="joinButton">Join Room</button>
            <div class="owner-notice"><i class="fas fa-crown"></i> = OWNER</div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io(
            atob(
                atob("YUhSMGNITTZMeTkyWVhCdmNpMWphR0YwTG05dWNtVnVaR1Z5TG1OdmJRPT0=")
            )
        );
        let username = "";
        let currentRoom = "";
        let lastMessageAuthor = "";

        function joinRoom(room) {
            currentRoom = room;
            document.querySelectorAll('.room-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelector('.chat-title').textContent = `Room ${room.replace('r', '')}`;
            document.getElementById('usernameModal').style.display = 'flex';
            document.getElementById('username').focus();
        }

        document.getElementById("username").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                document.getElementById("joinButton").click();
            }
        });

        document.getElementById("joinButton").onclick = () => {
            username = document.getElementById("username").value.trim();
            if (username && currentRoom) {
                socket.emit("join-room", {
                    username: username,
                    room: currentRoom
                });
                document.getElementById('usernameModal').style.display = 'none';
                document.getElementById("chatArea").style.display = "flex";
                document.getElementById("messages").style.display = "flex";
                document.getElementById("messageInput").disabled = false;
                document.getElementById("sendButton").disabled = false;
                document.getElementById("messageInput").focus();
            }
        };

        const emojiMap = {
            ":sob:": "😭",
            ":skull:": "💀",
            ":thumbsup:": "👍",
            ":wave:": "👋",
            ":laugh:": "😂",
            ":fire:": "🔥",
            ":smile:": "😃",
            ":crown:": "👑"
        };

        function replaceEmoji(inputElement) {
            let text = inputElement.value;
            for (const [shortcut, emoji] of Object.entries(emojiMap)) {
                const regex = new RegExp(`${shortcut}(?=\\s|$)`, "g");
                text = text.replace(regex, emoji);
            }
            inputElement.value = text;
        }

        document
            .getElementById("messageInput")
            .addEventListener("input", (event) => {
                const inputElement = event.target;
                replaceEmoji(inputElement);
                const value = inputElement.value;
                document.getElementById(
                    "messageCounter"
                ).textContent = `${value.length}/250`;
            });

        document
            .getElementById("messageInput")
            .addEventListener("keypress", (e) => {
                if (
                    e.key === "Enter" &&
                    !document.getElementById("sendButton").disabled
                ) {
                    document.getElementById("sendButton").click();
                }
            });

        document.getElementById("sendButton").onclick = () => {
            const message = document.getElementById("messageInput").value.trim();
            if (message) {
                socket.emit("chat-message", {
                    username: username,
                    room: currentRoom,
                    message: message,
                });
                document.getElementById("messageInput").value = "";
                document.getElementById("messageCounter").textContent = `0/250`;
                startCountdown();
            }
        };

        function startCountdown() {
            const cooldown = 1500;
            const intervalTime = 100;
            let remaining = cooldown;

            const countdownDisplay = document.getElementById("countdown");
            const sendButton = document.getElementById("sendButton");
            sendButton.disabled = true;
            countdownDisplay.style.display = "block";

            const interval = setInterval(() => {
                remaining -= intervalTime;
                const seconds = (remaining / 1000).toFixed(1);
                countdownDisplay.innerHTML = `<i class="fas fa-clock"></i>&nbsp;${seconds}s`;

                if (remaining <= 0) {
                    clearInterval(interval);
                    countdownDisplay.style.display = "none";
                    sendButton.disabled = false;
                }
            }, intervalTime);
        }

        const userCounter = document.getElementById("userCounter");
        const userTooltip = document.getElementById("userTooltip");

        userCounter.addEventListener("mouseenter", () => {
            userTooltip.classList.add("visible");
        });

        userCounter.addEventListener("mouseleave", () => {
            userTooltip.classList.remove("visible");
        });

        socket.on("user-list-update", (data) => {
            document.getElementById("userCount").textContent = data.count;
            
            const userList = document.getElementById("userList");
            userList.innerHTML = "";
            
            data.users.forEach(user => {
                const li = document.createElement("li");
                li.textContent = user;
                userList.appendChild(li);
            });
        });

        socket.on("chat-message", (data) => {
            const messagesBox = document.getElementById("messages");
            const messageContainer = document.createElement("div");

            if (
                data.username === "SYSTEM" &&
                (data.message.includes(" joined the room.") ||
                    data.message.includes(" left the room.") ||
                    data.message.includes(" has been kicked from the room."))
            ) {
                messageContainer.classList.add("system-message");
                messageContainer.innerHTML = data.message;
            } else {
                const isMyMessage = data.username === username;
                messageContainer.classList.add("message-wrapper");
                messageContainer.classList.add(isMyMessage ? "my-message-wrapper" : "other-message-wrapper");

                const isSameAuthor =
                    data.username === lastMessageAuthor &&
                    data.username !== "SYSTEM";

                if (!isSameAuthor && !isMyMessage) {
                    const usernameLabel = document.createElement("div");
                    usernameLabel.classList.add("username-label");

                    if (data.isOwner) {
                        const crownIcon = document.createElement("i");
                        crownIcon.className = "fas fa-crown owner-badge";
                        usernameLabel.appendChild(crownIcon);
                    }

                    const usernameText = document.createTextNode(data.username);
                    usernameLabel.appendChild(usernameText);
                    messageContainer.appendChild(usernameLabel);
                }

                const messageBubble = document.createElement("div");
                messageBubble.classList.add("message-bubble");
                messageBubble.textContent = data.message;
                messageContainer.appendChild(messageBubble);
                lastMessageAuthor = data.username;
            }

            messagesBox.appendChild(messageContainer);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        });

        socket.on("user-joined", (data) => {
            console.log(`Joined room ${data.room} as ${data.username}`);
        });

        socket.on("error", (message) => {
            alert("Error: " + message);
        });

        socket.on("kicked", () => {
            alert("You have been kicked from the room.");
            window.location.reload();
        });
    </script>
</body>

</html>
