<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/defaults.css" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Outfit", Arial, sans-serif;
        background: transparent;
        color: white;
      }

      .content {
        padding-top: 30px;
        height: 100%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        text-align: center;
        padding-bottom: 60px;
        padding-left: 30px;
        padding-right: 30px;
      }

      .filter-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 30px;
        width: auto;
        margin-top: 15px;
      }

      .toggle-container {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        justify-content: center;
      }

      .toggle-button {
        padding: 12px 32px;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(168, 85, 247, 0.3);
        border-radius: 16px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 16px;
        font-weight: 600;
        font-family: "Outfit", Arial, sans-serif;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(10px);
      }

      .toggle-button:hover {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.5);
        color: rgba(255, 255, 255, 0.9);
        transform: translateY(-2px);
      }

      .toggle-button.active {
        background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
        border-color: rgba(168, 85, 247, 0.6);
        color: #ffffff;
        box-shadow: 0 8px 24px rgba(147, 51, 234, 0.4);
      }

      .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        justify-content: center;
        padding: 20px;
        margin-top: 10px;
      }

      .game {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background-size: cover;
        background-position: center;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid rgba(168, 85, 247, 0.2);
        box-shadow: 0 4px 16px rgba(147, 51, 234, 0.2);
      }

      .game:hover {
        transform: translateY(-4px) scale(1.02);
        border-color: rgba(168, 85, 247, 0.6);
        box-shadow: 0 8px 24px rgba(147, 51, 234, 0.4);
      }


      .progress-container {
        width: 200px;
        margin: 0 auto;
        margin-top: 12px;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #9333ea 0%, #a855f7 100%);
        transition: 0.3s ease;
      }
      .progress-text {
        margin-top: 8px;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 500;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        position: relative;
        width: 1200px;
        height: 800px;
        background: black;
        border-radius: 12px;
        overflow: hidden;
      }

      .modal-content.fullscreen {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.8);
        border-bottom: 1px solid rgba(147, 51, 234, 0.3);
      }

      .modal-buttons {
        display: flex;
        gap: 8px;
      }

      .modal-btn {
        padding: 8px 16px;
        background: rgba(147, 51, 234, 0.2);
        border: 1px solid rgba(147, 51, 234, 0.4);
        border-radius: 6px;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 14px;
      }

      .modal-btn:hover {
        background: rgba(147, 51, 234, 0.4);
      }

      .modal-iframe {
        width: 100%;
        height: calc(100% - 49px);
        border: none;
      }

      #ad {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        border-radius: 10px;
      }
    </style>
    <style>
      #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: -99;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/scripts/particle.js"></script>
  </head>
  <body>
    <div id="particles-js"></div>
    <div class="content">
      <small
        >Gầme images are being added.<br />All gầmes should function
        normally.</small
      >
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
        <div class="progress-text" id="progressText">-/-</div>
      </div>
      <div class="game-grid" id="gameGrid" style="opacity: 0"></div>
    </div>
    <div class="modal" id="modal">
      <div class="modal-content" id="modalContent">
        <div class="modal-header">
          <span id="modalTitle">Game</span>
          <div class="modal-buttons">
            <button class="modal-btn" id="fullscreenBtn">Fullscreen</button>
            <button class="modal-btn" id="closeBtn">Close</button>
          </div>
        </div>
        <iframe class="modal-iframe" id="modalIframe"></iframe>
      </div>
    </div>
    <iframe id="ad" data-aa='2395310' src='//ad.a-ads.com/2395310?size=120x600' style='width:120px; height:600px; border:0px; padding:0; overflow:hidden; background-color: transparent;'></iframe>
    <script>
      let games = [];
      let activeFilters = [];
      let progressBarFill = document.getElementById("progressBarFill");
      let progressText = document.getElementById("progressText");
      let progressContainer = document.getElementById("progressContainer");
      let gameGrid = document.getElementById("gameGrid");

      async function loadGames() {
        const response = await fetch('/games.json');
        const data = await response.json();
        games = data.sort((a, b) => a.name.localeCompare(b.name)); // Sort games alphabetically

        progressText.textContent = `0/${games.length}`;

        for (let i = 0; i < games.length; i++) {
          progressText.textContent = `${i + 1}/${games.length}`;
          progressBarFill.style.width = `${((i + 1) / games.length) * 100}%`;
        }

        await new Promise((resolve) => setTimeout(resolve, 100));

        progressContainer.style.display = "none";
        gameGrid.style.opacity = "1";

        renderGames();
      }

      function renderGames() {
        const grid = document.getElementById("gameGrid");
        grid.innerHTML = "";

        games.forEach((game) => {
          const backgroundUrl = game.img;

          const gameDiv = document.createElement("div");
          gameDiv.classList.add("game");
          gameDiv.style.backgroundImage = `url(${backgroundUrl})`;
          gameDiv.style.cursor = "pointer";

          gameDiv.addEventListener("click", () => {
            openGameModal(game.name);
          });

          grid.appendChild(gameDiv);
        });
      }

      async function openGameModal(gameId) {
        const modal = document.getElementById("modal");
        const modalIframe = document.getElementById("modalIframe");
        const modalTitle = document.getElementById("modalTitle");

        let htmlPath = null;

        // Try different filename variations for gn-math
        const variations = [
          `${gameId}.html`,
          `${gameId}-fix.html`,
          `${gameId}-copy.html`,
          `${gameId}-f.html`,
          `${gameId}-win.html`,
          `${gameId}-fde.html`
        ];

        for (const variation of variations) {
          const testPath = `/gn-math/gn-math-html/html-main/${variation}`;
          try {
            const response = await fetch(testPath, { method: 'HEAD' });
            if (response.ok) {
              htmlPath = testPath;
              break;
            }
          } catch (e) {
            // Continue to next variation
          }
        }

        if (htmlPath) {
          modalIframe.src = htmlPath;
          modalTitle.textContent = `Game ${gameId}`;
          modal.classList.add("active");
        } else {
          alert(`HTML file not found for game ${gameId}`);
        }
      }

      function closeModal() {
        const modal = document.getElementById("modal");
        const modalIframe = document.getElementById("modalIframe");
        modal.classList.remove("active");
        modalIframe.src = "";
      }

      function toggleFullscreen() {
        const modalContent = document.getElementById("modalContent");
        modalContent.classList.toggle("fullscreen");
      }

      document.getElementById("closeBtn").addEventListener("click", closeModal);
      document.getElementById("fullscreenBtn").addEventListener("click", toggleFullscreen);

      // Close modal on escape key
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModal();
        }
      });

      // Close modal when clicking outside content
      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target.id === "modal") {
          closeModal();
        }
      });

      function filterGames(category) {
        const index = activeFilters.indexOf(category);
        if (index > -1) {
          activeFilters.splice(index, 1);
        } else {
          activeFilters.push(category);
        }
        renderGames();
      }

      loadGames();
    </script>
  </body>
</html>
